<!DOCTYPE html>
<html>
<head>
    <title>The Loop - Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3 class="mb-3">Tee Recommendation</h3>
    <div class="alert alert-success">
        Based on your handicap of <strong>{{ handicap }}</strong>, we recommend the <strong>{{ tee }}</strong> tees.
    </div>
    <p class="mt-3 fst-italic">{{ motivational_msg }}</p>
    <a href="/" class="btn btn-outline-success mt-3">Search another course</a>
</div>
</body>
</html>
